<!doctype html>
<html lang="en">
  <head>
    <script>
      // Essential Polyfills
      // Setup a global object that doesn't strictly === window
      // This allows node-fetch/cross-fetch to assign global.fetch without crashing
      // on getter-only window.fetch environments.
      if (typeof window !== 'undefined') {
        // Setup a global object that doesn't strictly === window
        // This allows node-fetch/cross-fetch to assign global.fetch without crashing
        // on getter-only window.fetch environments.
        const globalObj = Object.create(window);
        
        // Explicitly allow fetch to be shadowed on the global object
        let currentFetch = window.fetch;
        try {
            Object.defineProperty(globalObj, 'fetch', {
                get: () => currentFetch,
                set: (v) => { 
                    console.log('[AJI_PROTOCOL] Shadowing global fetch:', v);
                    currentFetch = v; 
                },
                configurable: true,
                enumerable: true
            });
        } catch(e) {
            console.warn('[AJI_PROTOCOL] Failed to define shadow fetch:', e);
        }

        // Bind members that require window context
        ['setTimeout', 'clearTimeout', 'setInterval', 'clearInterval', 'requestAnimationFrame', 'cancelAnimationFrame', 'addEventListener', 'removeEventListener', 'dispatchEvent'].forEach(fn => {
            if (typeof window[fn] === 'function') {
                globalObj[fn] = window[fn].bind(window);
            }
        });
        window.global = globalObj;
        window.process = { env: { NODE_ENV: 'development' } };
      }
      
      // Keep Buffer global if needed early
      if (typeof window !== 'undefined' && !window.Buffer) {
        window.Buffer = { isBuffer: () => false }; // Minimal placeholder until real polyfill loads
      }

      // Capture errors before React boots
      function renderStartupError(title, err) {
        const root = document.getElementById('root');
        const overlay = document.getElementById('loading-overlay');
        const status = document.getElementById('loading-status');
        
        console.error('CRITICAL_STARTUP:', title, err);
        
        if (overlay) overlay.style.background = '#0a0a0a';
        if (status) {
          status.style.color = '#ff4444';
          status.style.opacity = '1';
          status.innerHTML = `
            <div style="text-align: left; background: #1a1a1a; padding: 20px; border-radius: 8px; border: 1px solid #333; max-width: 500px; margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
              <div style="font-weight: bold; font-size: 14px; margin-bottom: 10px; color: #ff3333; letter-spacing: 1px;">[PROTOCOL_CRASH: ${title}]</div>
              <div style="font-size: 11px; white-space: pre-wrap; font-family: monospace; color: #aaa; margin-bottom: 20px;">${err}</div>
              <button onclick="location.reload()" style="width: 100%; padding: 12px; background: #f7931a; color: #000; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: transform 0.1s;" onmousedown="this.style.transform='scale(0.98)'" onmouseup="this.style.transform='scale(1)'">REBOOT CLUSTER</button>
            </div>
          `;
        }
      }

      window.addEventListener('error', (e) => renderStartupError('SYNTAX_OR_RUNTIME', e.message + ' (' + e.filename + ':' + e.lineno + ')'));
      window.addEventListener('unhandledrejection', (e) => renderStartupError('PROMISE_REJECTION', (e.reason && e.reason.message) || e.reason));
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CapitolDbro - AI Mining Hub</title>
    <link rel="manifest" href="/manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registered', reg))
            .catch(err => console.log('SW failed', err));
        });
      }
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#F7931A">
  </head>
  <body>
    <div id="root">
      <div id="loading-overlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;color:#39FF14;font-family:monospace;">
        <div style="font-size:24px;font-weight:bold;margin-bottom:10px;text-shadow:0 0 10px rgba(57,255,20,0.5);">[AJI_PROTOCOL_INIT]</div>
        <div id="loading-status" style="font-size:12px;opacity:0.8;">LOADING CORE ENGINE...</div>
      </div>
    </div>
    <script>
      // Fallback: if React doesn't mount in 30 seconds, try to show something
      setTimeout(function() {
        var status = document.getElementById('loading-status');
        if (status && status.innerText === 'LOADING CORE ENGINE...') {
          status.innerHTML = 'ENGINE INITIALIZATION DELAYED...<br>CHECK CONSOLE FOR ERRORS';
          status.style.color = '#ff3333';
        }
      }, 30000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
  </body>
</html>
